name: Release

# Publishes the NuGet packages (HomeBridge.Net, HomeBridge.Net.Build, HomeBridge.Net.Templates)
# and the npm package (@homebridgenet/host). Trigger by pushing a tag like `v0.1.0`, or run
# manually with an explicit version. Requires repo secrets NUGET_API_KEY and NPM_TOKEN.
on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.1.0)'
        required: true

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - id: ver
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            V="${GITHUB_REF_NAME#v}"
          else
            V="${{ github.event.inputs.version }}"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Publishing version $V"

  nuget:
    needs: resolve-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Pack
        run: |
          V='${{ needs.resolve-version.outputs.version }}'
          dotnet pack src/HomeBridge.Net -c Release -o artifacts -p:Version=$V
          dotnet pack src/HomeBridge.Net.Build -c Release -o artifacts -p:Version=$V
          dotnet pack templates/HomeBridge.Net.Templates.csproj -c Release -o artifacts -p:Version=$V
      - name: Push to NuGet.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: dotnet nuget push "artifacts/*.nupkg" --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate

  npm:
    needs: resolve-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          registry-url: 'https://registry.npmjs.org'
      - name: Publish @homebridgenet/host
        working-directory: host/homebridgenet-host
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm version '${{ needs.resolve-version.outputs.version }}' --no-git-tag-version --allow-same-version
          npm publish --access public
