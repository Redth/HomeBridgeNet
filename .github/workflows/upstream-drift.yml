name: Upstream drift

# Keeps pace with Homebridge / HAP. Weekly (and on demand): regenerate the HAP catalog against the
# latest hap-nodejs and open a PR if it changed; also re-run the clean-room boot against the latest
# Homebridge.
on:
  schedule:
    - cron: '0 6 * * 1'   # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  hap-catalog-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
      - name: Regenerate HAP catalog against latest hap-nodejs
        id: regen
        run: |
          cd tools/hap-catalog-gen
          npm install hap-nodejs@latest --no-save --no-fund --no-audit
          HAP_VERSION=$(node -e "console.log(require('hap-nodejs/package.json').version)")
          node generate.js
          echo "hap_version=$HAP_VERSION" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Verify the regenerated catalog still builds
        run: dotnet build src/HomeBridge.Net -c Release
      - name: Open a PR if the catalog changed
        uses: peter-evans/create-pull-request@v6
        with:
          branch: chore/hap-catalog-update
          base: master
          add-paths: src/HomeBridge.Net/Generated/*.g.cs
          commit-message: "Regenerate HAP catalog from hap-nodejs ${{ steps.regen.outputs.hap_version }}"
          title: "Update HAP catalog (hap-nodejs ${{ steps.regen.outputs.hap_version }})"
          labels: dependencies,automated
          body: |
            Automated update of the generated HAP catalog against **hap-nodejs ${{ steps.regen.outputs.hap_version }}**.

            Review the diff under `src/HomeBridge.Net/Generated/` (services, characteristics, enums,
            categories). The catalog already compiled in CI. If you adopt new characteristics, also
            consider bumping the pinned `hap-nodejs` in `tools/hap-catalog-gen/package.json`.

            _Generated by the `upstream-drift` workflow._

  cleanroom-latest-homebridge:
    # The clean-room script installs `homebridge` (latest), so this also catches Homebridge drift.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Boot sample under latest Homebridge (no system .NET)
        run: bash tools/cleanroom/run-cleanroom.sh --arch x64
